<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding — David &amp; Kathryn</title>
  <link rel="stylesheet" href="../site.css">
  <link rel="stylesheet" href="gallery.css">
</head>
<body>
<div class="page">

  <nav class="site-nav" aria-label="Site navigation">
    <a href="../photos.html">← Photo Galleries</a>
  </nav>

  <header>
    <h1>09/09/2021</h1>
    <p>David &amp; Kathryn &mdash; 634 photos</p>
  </header>

  <main class="grid" id="gallery"></main>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
  <button class="lb-close" id="lbClose" aria-label="Close">&#x2715;</button>
  <button class="lb-btn lb-prev" id="lbPrev" aria-label="Previous">&#x2039;</button>
  <div class="lightbox-img-wrap">
    <img id="lbImg" src="" alt="">
  </div>
  <button class="lb-btn lb-next" id="lbNext" aria-label="Next">&#x203A;</button>
  <div class="lb-counter" id="lbCounter"></div>
</div>

<script src="gallery.js"></script>
<script>
  const BASE = 'https://d1mdd4q3n2hv7r.cloudfront.net/wedding/';

  const photos = ['Kathryn+David.jpg'];
  for (let i = 2; i <= 635; i++) {
    if (i === 626) continue;
    photos.push(`Kathryn+David-${i}.jpg`);
  }

  initGallery(BASE, photos, 'Wedding');
</script>
</body>
</html>
