<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engagement — David &amp; Kathryn</title>

  <link rel="stylesheet" href="gallery.css">

</head>
<body>
<div class="page">

  <nav class="site-nav" aria-label="Site navigation">
    <a href="../photos.html">← Photo Galleries</a>
  </nav>

  <header>
    <h1>Engagement</h1>
    <p>David &amp; Kathryn &mdash; 90 photos</p>
  </header>

  <main class="grid" id="gallery"></main>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
  <button class="lb-close" id="lbClose" aria-label="Close">&#x2715;</button>
  <button class="lb-btn lb-prev" id="lbPrev" aria-label="Previous">&#x2039;</button>
  <div class="lightbox-img-wrap">
    <img id="lbImg" src="" alt="">
  </div>
  <button class="lb-btn lb-next" id="lbNext" aria-label="Next">&#x203A;</button>
  <div class="lb-counter" id="lbCounter"></div>
</div>

<script>
  const BASE = 'https://d1mdd4q3n2hv7r.cloudfront.net/engagement/';

  const photos = ['Kathryn+David.jpg'];
  for (let i = 2; i <= 90; i++) photos.push(`Kathryn+David-${i}.jpg`);

  // Build grid
  const gallery = document.getElementById('gallery');
  photos.forEach((filename, i) => {
    const url = BASE + filename.replace(/\+/g, '%2B');
    const div = document.createElement('div');
    div.className = 'thumb';
    div.dataset.index = i;
    const img = document.createElement('img');
    img.alt = `Engagement photo ${i + 1}`;
    img.loading = 'lazy';
    img.src = url;
    img.addEventListener('load', () => img.classList.add('loaded'));
    img.addEventListener('error', () => img.classList.add('loaded')); // don't hang on error
    div.appendChild(img);
    div.addEventListener('click', () => openLightbox(i));
    gallery.appendChild(div);
  });

  // Lightbox
  const lightbox  = document.getElementById('lightbox');
  const lbImg     = document.getElementById('lbImg');
  const lbCounter = document.getElementById('lbCounter');
  let current = 0;

  function openLightbox(index) {
    current = index;
    showPhoto();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
    lbImg.src = '';
  }

  function showPhoto() {
    const url = BASE + photos[current].replace(/\+/g, '%2B');
    lbImg.src = url;
    lbImg.alt = `Engagement photo ${current + 1}`;
    lbCounter.textContent = `${current + 1} / ${photos.length}`;
  }

  function prev() { current = (current - 1 + photos.length) % photos.length; showPhoto(); }
  function next() { current = (current + 1) % photos.length; showPhoto(); }

  document.getElementById('lbClose').addEventListener('click', closeLightbox);
  document.getElementById('lbPrev').addEventListener('click', prev);
  document.getElementById('lbNext').addEventListener('click', next);

  // Close on backdrop click
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'ArrowLeft')  prev();
    if (e.key === 'ArrowRight') next();
    if (e.key === 'Escape')     closeLightbox();
  });
</script>
</body>
</html>
