  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #faf8f3;
      --paper:     #fffef9;
      --ink:       #2c2416;
      --muted:     #7a6e5f;
      --rule:      #d9d0c0;
      --accent:    #8b3a2a;
      --hover:     #6e2d1f;
      --font-body: Georgia, 'Times New Roman', serif;
      --font-ui:   system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      padding: 2rem 1rem 4rem;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 3rem 3.5rem 4rem;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
    }

    @media (max-width: 600px) {
      .page { padding: 1.5rem 1.25rem 2.5rem; }
      body  { padding: 0.5rem 0.25rem 3rem; }
    }

    .site-nav {
      font-family: var(--font-ui);
      font-size: 0.8rem;
      margin-bottom: 1.25rem;
    }
    .site-nav a { color: var(--muted); text-decoration: none; }
    .site-nav a:hover { color: var(--accent); }

    header {
      text-align: center;
      padding-bottom: 2rem;
      border-bottom: 2px solid var(--rule);
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2rem;
      letter-spacing: .08em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    header p {
      font-style: italic;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.5rem;
      margin-bottom: 1.25rem;
      font-family: var(--font-ui);
      font-size: 0.82rem;
      color: var(--muted);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,.25);
      flex-shrink: 0;
    }

    /* ── Map ── */
    #map {
      width: 100%;
      height: 620px;
      border: 1px solid var(--rule);
      border-radius: 4px;
    }

    /* ── Leaflet popup overrides ── */
    .leaflet-popup-content-wrapper {
      border-radius: 4px;
      padding: 0;
      overflow: hidden;
      font-family: var(--font-ui);
    }

    .leaflet-popup-content {
      margin: 0;
      width: 200px !important;
    }

    .popup-img {
      width: 200px;
      height: 133px;
      object-fit: cover;
      display: block;
    }

    .popup-body {
      padding: 0.6rem 0.75rem 0.75rem;
    }

    .popup-gallery {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }

    .popup-link {
      font-size: 0.8rem;
      color: var(--accent);
      text-decoration: none;
    }

    .popup-link:hover { color: var(--hover); text-decoration: underline; }
  </style>
</head>

    subdomains: 'abcd',
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
  }).addTo(map);

  // Build legend
  const legendEl = document.getElementById('legend');

  galleries.forEach(gallery => {
    if (gallery.placeholder) {
      // Legend entry — dimmed
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.style.opacity = '0.45';
      item.innerHTML = `<span class="legend-dot" style="background:none;border-color:${gallery.color}"></span>${gallery.label} — coming soon`;
      legendEl.appendChild(item);

      // Single hollow marker at approximate centre
      L.circleMarker(gallery.center, {
        radius: 8,
        fillColor: 'none',
        color: gallery.color,
        weight: 2,
        opacity: 0.5,
        fillOpacity: 0,
        dashArray: '4 3',
      }).addTo(map).bindPopup(`
        <div class="popup-body" style="padding:0.75rem">
          <div class="popup-gallery">${gallery.label}</div>
          <span style="font-size:0.8rem;color:var(--muted)">Coming soon — no photos yet</span>
        </div>
      `, { maxWidth: 200 });
    } else {
      // Legend entry
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<span class="legend-dot" style="background:${gallery.color}"></span>${gallery.label} (${gallery.photos.length} photos)`;
      legendEl.appendChild(item);

      // Photo markers
      gallery.photos.forEach(([filename, lat, lng]) => {
        const marker = L.circleMarker([lat, lng], {
          radius: 7,
          fillColor: gallery.color,
          color: '#fff',
          weight: 1.5,
          opacity: 1,
          fillOpacity: 0.85,
        }).addTo(map);

        const imgUrl = CDN + gallery.folder + encodeURIComponent(filename);
        marker.bindPopup(`
          <img class="popup-img" src="${imgUrl}" alt="${gallery.label}" loading="lazy">
          <div class="popup-body">
            <div class="popup-gallery">${gallery.label}</div>
            <a class="popup-link" href="${gallery.href}">View gallery →</a>
          </div>
        `, { maxWidth: 200 });
      });
    }
  });

  // Fit map to photo markers only (exclude placeholder centres from bounds)
  const allCoords = galleries.filter(g => !g.placeholder).flatMap(g => g.photos.map(([,lat,lng]) => [lat, lng]));
  map.fitBounds(allCoords, { padding: [40, 40] });
